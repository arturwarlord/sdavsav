<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>

   <script>
    export default function DndLorePortal() {
  const campaigns = [
    {
      title: 'Нисхождение в Авернус',
      description: 'Кампания по Forgotten Realms с путешествием в Авернус.',
    },
    {
      title: 'Проклятие Страда',
      description: 'Мрачное приключение в Баровии.',
    },
  ];

  const characters = [
    {
      name: 'Талис',
      race: 'Тифлинг',
      cls: 'Колдун',
      lore: 'Изгнанник из Элтюреля, связанный с демоническим контрактом.',
    },
    {
      name: 'Бром',
      race: 'Дварф',
      cls: 'Паладин',
      lore: 'Бывший храмовник, поклявшийся очистить Авернус.',
    },
  ];

  const locations = [
    {
      name: 'Элтюрель',
      type: 'Город',
    },
    {
      name: 'Кровавая Цитадель',
      type: 'Подземелье',
    },
  ];

  const npcs = [
    {
      name: 'Зариэль',
      role: 'Архидьявол',
    },
    {
      name: 'Лулу',
      role: 'Небесный слон',
    },
  ];

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100">
      <header className="border-b border-zinc-800 bg-zinc-900/80 backdrop-blur sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div>
            <h1 className="text-3xl font-bold tracking-wide text-amber-400">
              DnD Lore Portal
            </h1>
            <p className="text-zinc-400 text-sm">
              Совместная база знаний для кампаний Dungeons & Dragons
            </p>
          </div>

          <nav className="flex gap-4 text-sm">
            <a className="hover:text-amber-400 transition" href="#campaigns">
              Кампании
            </a>
            <a className="hover:text-amber-400 transition" href="#characters">
              Персонажи
            </a>
            <a className="hover:text-amber-400 transition" href="#map">
              Карта
            </a>
            <a className="hover:text-amber-400 transition" href="#sessions">
              Сессии
            </a>
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-10 space-y-16">
        <section className="grid lg:grid-cols-2 gap-8 items-center">
          <div className="space-y-6">
            <div className="inline-flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-full text-amber-300 text-sm">
              ⚔️ Dungeons & Dragons Campaign Manager
            </div>

            <h2 className="text-5xl font-black leading-tight">
              Храни весь лор своей кампании в одном месте
            </h2>

            <p className="text-zinc-400 text-lg leading-relaxed">
              Создавай персонажей, NPC, карты, локации и заметки.
              Работай вместе с друзьями и веди историю вашей кампании.
            </p>

            <div className="flex flex-wrap gap-4">
              <button className="bg-amber-500 hover:bg-amber-400 text-black font-semibold px-6 py-3 rounded-2xl transition shadow-lg shadow-amber-500/20">
                Создать кампанию
              </button>

              <button className="border border-zinc-700 hover:border-zinc-500 px-6 py-3 rounded-2xl transition">
                Экспорт данных
              </button>
            </div>
          </div>

          <div className="bg-gradient-to-br from-zinc-900 to-zinc-800 rounded-3xl border border-zinc-700 p-6 shadow-2xl">
            <div className="aspect-video rounded-2xl bg-[url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?q=80&w=1600&auto=format&fit=crop')] bg-cover bg-center relative overflow-hidden">
              <div className="absolute inset-0 bg-black/50" />

              <div className="absolute bottom-4 left-4 right-4 grid grid-cols-2 gap-3">
                <div className="bg-zinc-950/80 backdrop-blur border border-zinc-700 rounded-xl p-3">
                  <div className="text-xs text-zinc-400">NPC</div>
                  <div className="font-semibold text-amber-300">Зариэль</div>
                </div>

                <div className="bg-zinc-950/80 backdrop-blur border border-zinc-700 rounded-xl p-3">
                  <div className="text-xs text-zinc-400">Локация</div>
                  <div className="font-semibold text-amber-300">Элтюрель</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="campaigns" className="space-y-6">
          <div className="flex items-center justify-between">
            <h3 className="text-3xl font-bold">Кампании</h3>
            <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
              + Новая кампания
            </button>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            {campaigns.map((campaign) => (
              <div
                key={campaign.title}
                className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-amber-500/40 transition"
              >
                <div className="space-y-4">
                  <div className="flex items-center justify-between">
                    <h4 className="text-2xl font-bold text-amber-300">
                      {campaign.title}
                    </h4>

                    <span className="text-xs bg-amber-500/10 text-amber-300 px-3 py-1 rounded-full border border-amber-500/20">
                      Активна
                    </span>
                  </div>

                  <p className="text-zinc-400 leading-relaxed">
                    {campaign.description}
                  </p>

                  <div className="flex gap-3 pt-2">
                    <button className="bg-amber-500 text-black px-4 py-2 rounded-xl font-medium hover:bg-amber-400 transition">
                      Открыть
                    </button>

                    <button className="border border-zinc-700 px-4 py-2 rounded-xl hover:border-zinc-500 transition">
                      Настройки
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </section>

        <section id="characters" className="space-y-6">
          <div className="flex items-center justify-between">
            <h3 className="text-3xl font-bold">Персонажи</h3>
            <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
              + Добавить персонажа
            </button>
          </div>

          <div className="grid lg:grid-cols-2 gap-6">
            {characters.map((char) => (
              <div
                key={char.name}
                className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6"
              >
                <div className="flex gap-5">
                  <div className="w-24 h-24 rounded-2xl bg-gradient-to-br from-amber-500 to-red-700 flex items-center justify-center text-3xl font-black text-black shrink-0">
                    {char.name[0]}
                  </div>

                  <div className="space-y-3 flex-1">
                    <div>
                      <h4 className="text-2xl font-bold text-amber-300">
                        {char.name}
                      </h4>

                      <div className="text-zinc-400">
                        {char.race} • {char.cls}
                      </div>
                    </div>

                    <p className="text-zinc-300 leading-relaxed">
                      {char.lore}
                    </p>

                    <div className="flex gap-2 flex-wrap">
                      <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs">
                        Игрок
                      </span>
                      <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs">
                        Активен
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </section>

        <section className="grid lg:grid-cols-2 gap-8">
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h3 className="text-3xl font-bold">NPC</h3>
              <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
                + NPC
              </button>
            </div>

            <div className="space-y-4">
              {npcs.map((npc) => (
                <div
                  key={npc.name}
                  className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex items-center justify-between"
                >
                  <div>
                    <div className="text-xl font-semibold text-amber-300">
                      {npc.name}
                    </div>
                    <div className="text-zinc-400 text-sm">{npc.role}</div>
                  </div>

                  <button className="border border-zinc-700 px-4 py-2 rounded-xl hover:border-zinc-500 transition">
                    Открыть
                  </button>
                </div>
              ))}
            </div>
          </div>

          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h3 className="text-3xl font-bold">Локации</h3>
              <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
                + Локация
              </button>
            </div>

            <div className="space-y-4">
              {locations.map((loc) => (
                <div
                  key={loc.name}
                  className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex items-center justify-between"
                >
                  <div>
                    <div className="text-xl font-semibold text-amber-300">
                      {loc.name}
                    </div>
                    <div className="text-zinc-400 text-sm">{loc.type}</div>
                  </div>

                  <button className="border border-zinc-700 px-4 py-2 rounded-xl hover:border-zinc-500 transition">
                    Открыть
                  </button>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section id="map" className="space-y-6">
          <div className="flex items-center justify-between">
            <h3 className="text-3xl font-bold">Интерактивная карта</h3>

            <div className="flex gap-3">
              <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
                Загрузить карту
              </button>

              <button className="bg-amber-500 hover:bg-amber-400 text-black px-4 py-2 rounded-xl font-semibold transition">
                + Маркер
              </button>
            </div>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
            <div className="relative aspect-[16/8] bg-[url('https://images.unsplash.com/photo-1521295121783-8a321d551ad2?q=80&w=1600&auto=format&fit=crop')] bg-cover bg-center">
              <div className="absolute inset-0 bg-black/40" />

              <div className="absolute top-[35%] left-[45%]">
                <div className="w-5 h-5 rounded-full bg-red-500 animate-ping absolute" />
                <div className="w-5 h-5 rounded-full bg-red-500 relative border-4 border-white" />
              </div>

              <div className="absolute top-[60%] left-[25%]">
                <div className="w-5 h-5 rounded-full bg-amber-400 animate-pulse border-4 border-white" />
              </div>

              <div className="absolute bottom-5 left-5 bg-zinc-950/80 backdrop-blur border border-zinc-700 rounded-2xl p-4 max-w-sm">
                <div className="text-amber-300 font-semibold">
                  Элтюрель
                </div>
                <p className="text-sm text-zinc-300 mt-1">
                  Город был затянут в Авернус и стал центром катастрофы.
                </p>
              </div>
            </div>
          </div>
        </section>

        <section id="sessions" className="space-y-6">
          <div className="flex items-center justify-between">
            <h3 className="text-3xl font-bold">Журнал сессий</h3>
            <button className="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl transition">
              + Сессия
            </button>
          </div>

          <div className="space-y-4">
            <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h4 className="text-2xl font-bold text-amber-300">
                    Сессия #12
                  </h4>
                  <div className="text-zinc-500 text-sm">
                    10 мая 2026
                  </div>
                </div>

                <span className="bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1 rounded-full text-xs">
                  Завершена
                </span>
              </div>

              <p className="text-zinc-300 leading-relaxed">
                Группа добралась до разрушенного Элтюреля, встретила Лулу и
                обнаружила следы демонического ритуала в катакомбах.
              </p>

              <div className="flex flex-wrap gap-2 mt-5">
                <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs">
                  Элтюрель
                </span>
                <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs">
                  Лулу
                </span>
                <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs">
                  Демоны
                </span>
              </div>
            </div>
          </div>
        </section>

        <section className="grid lg:grid-cols-3 gap-6">
          <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div className="text-4xl font-black text-amber-400">∞</div>
            <h4 className="text-2xl font-bold mt-4 mb-3">
              Локальное хранение
            </h4>
            <p className="text-zinc-400 leading-relaxed">
              Все данные можно хранить прямо в браузере через IndexedDB.
            </p>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div className="text-4xl font-black text-amber-400">⚡</div>
            <h4 className="text-2xl font-bold mt-4 mb-3">
              Совместная работа
            </h4>
            <p className="text-zinc-400 leading-relaxed">
              Игроки могут вместе редактировать лор кампании.
            </p>
          </div>

          <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div className="text-4xl font-black text-amber-400">🗺️</div>
            <h4 className="text-2xl font-bold mt-4 mb-3">
              Интерактивный мир
            </h4>
            <p className="text-zinc-400 leading-relaxed">
              Создавай собственные карты и связывай их с лором.
            </p>
          </div>
        </section>
      </main>

      <footer className="border-t border-zinc-800 mt-20">
        <div className="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4 text-zinc-500 text-sm">
          <div>
            DnD Lore Portal • Русская wiki для Dungeons & Dragons
          </div>

          <div className="flex gap-4">
            <span>Next.js</span>
            <span>TailwindCSS</span>
            <span>Leaflet</span>
            <span>IndexedDB</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

</script>

</body>
</html>
